server:
  port: ${COMMERCE_PORT:8800}

spring:
  application:
    name: commerce-order
  cloud:
    nacos:
      server-addr: ${LAB_NACOS_ADDR:127.0.0.1:8848}
      username: ${LAB_NACOS_USERNAME:nacos}
      password: ${LAB_NACOS_PASSWORD:nacos}
      discovery:
        namespace: ${LAB_NACOS_NAMESPACE:}
        group: ${LAB_NACOS_GROUP:DEFAULT_GROUP}
    stream:
      rocketmq:
        binder:
          name-server: ${LAB_ROCKETMQ_NAMESRV:127.0.0.1:9876}
      bindings:
        orderEvent-out-0:
          destination: COMMERCE_ORDER_EVENT
          content-type: application/json
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${LAB_MYSQL_HOST:127.0.0.1}:${LAB_MYSQL_PORT:3306}/commerce_order?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${LAB_MYSQL_USERNAME:root}
    password: ${LAB_MYSQL_PASSWORD:root123}
seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: ${LAB_SEATA_TX_GROUP:my_tx_group}
  service:
    vgroup-mapping:
      my_tx_group: ${LAB_SEATA_CLUSTER:default}
  registry:
    type: nacos
    nacos:
      server-addr: ${LAB_NACOS_ADDR:127.0.0.1:8848}
      group: ${LAB_SEATA_GROUP:DEFAULT_GROUP}
      application: ${LAB_SEATA_APPLICATION:seata-server}
      username: ${LAB_NACOS_USERNAME:nacos}
      password: ${LAB_NACOS_PASSWORD:nacos}
  config:
    type: file

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${LAB_ENV:local}

logging:
  file:
    name: ${LAB_LOG_DIR:./logs}/${spring.application.name}.log
