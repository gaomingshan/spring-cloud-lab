services:
  oap:
    image: apache/skywalking-oap-server:10.1.0
    container_name: skywalking-oap
    restart: unless-stopped
    ports:
      - "11800:11800"   # gRPC（Agent 上报 - SkyWalking 自定义协议）
      - "12800:12800"   # HTTP（UI / API）
      - "4317:4317"     # OTLP gRPC 接收端口（新增）
      - "4318:4318"     # OTLP HTTP 接收端口（新增）
    environment:
      TZ: Asia/Shanghai
      SW_STORAGE: mysql
      SW_JDBC_URL: jdbc:mysql://mysql:3306/skywalking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&rewriteBatchedStatements=true
      SW_DATA_SOURCE_USER: admin
      SW_DATA_SOURCE_PASSWORD: admin
      # 启用 OTLP gRPC Receiver（关键配置）
      SW_OTEL_RECEIVER: default
      SW_OTEL_RECEIVER_ENABLED_HANDLERS: otlp-traces,otlp-metrics,otlp-logs
      SW_OTEL_RECEIVER_ENABLED_OTEL_RULES: "*"
      # 启用 Zipkin Receiver（OTLP Trace Handler 的内部依赖）
      SW_RECEIVER_ZIPKIN: default
      JAVA_OPTS: "-Xms1g -Xmx1g"
    volumes:
      - ./oap-libs:/skywalking/ext-libs
    networks:
      - middleware-net

  ui:
    image: apache/skywalking-ui:10.1.0
    container_name: skywalking-ui
    restart: unless-stopped
    depends_on:
      - oap
    ports:
      - "18080:8080"
    environment:
      TZ: Asia/Shanghai
      SW_OAP_ADDRESS: http://192.168.179.128:12800  # 使用服务名更可靠
    networks:
      - middleware-net

networks:
  middleware-net:
    external: true