input {
  # 接收 Filebeat 发送的日志
  beats {
    port => 5044
  }
  # 也支持 TCP 直接接收（Logback 可通过 TCP Appender 直连 Logstash）
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # 如果日志内容是 JSON 格式，解析为结构化字段
  json {
    source => "message"
    skip_on_invalid_json => true
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logstash-%{+YYYY.MM.dd}"
  }
}
