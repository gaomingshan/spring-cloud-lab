server:
  port: 8200

spring:
  application:
    name: lab-sentinel
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
    sentinel:
      transport:
        # Sentinel Dashboard 地址
        dashboard: 127.0.0.1:8858
        port: 8719  # 客户端与 Dashboard 通信端口
      # 规则持久化：从 Nacos 加载规则（双向同步需要 Dashboard 推送到 Nacos）
      datasource:
        flow-rules:           # 流控规则
          nacos:
            server-addr: 127.0.0.1:8848
            data-id: ${spring.application.name}-flow-rules
            group-id: SENTINEL_GROUP
            data-type: json
            rule-type: flow
        degrade-rules:        # 熔断规则
          nacos:
            server-addr: 127.0.0.1:8848
            data-id: ${spring.application.name}-degrade-rules
            group-id: SENTINEL_GROUP
            data-type: json
            rule-type: degrade
        hotspot-rules:        # 热点规则
          nacos:
            server-addr: 127.0.0.1:8848
            data-id: ${spring.application.name}-hotspot-rules
            group-id: SENTINEL_GROUP
            data-type: json
            rule-type: param-flow
      # 饥饿加载（启动时立即加载规则，而非首次请求时）
      eager: true

management:
  endpoints:
    web:
      exposure:
        include: health,sentinel
