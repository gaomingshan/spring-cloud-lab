server:
  port: 8103

spring:
  application:
    name: feign-consumer
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        namespace: ""

feign:
  # 启用 OkHttp 替换默认 HttpURLConnection（支持连接池、HTTP/2）
  okhttp:
    enabled: true
  # 启用 Feign 日志（配合 Logger.Level 使用）
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000
        logger-level: FULL   # NONE / BASIC / HEADERS / FULL
      # 针对特定服务的配置（覆盖 default）
      feign-provider:
        connect-timeout: 3000
        read-timeout: 5000

logging:
  level:
    com.lab.feign.consumer.client: DEBUG  # 开启 Feign 日志需要 DEBUG 级别
