version: '3.8'

# Spring Cloud Lab 基础设施一键启动
# 用法：docker-compose up -d
# 按需启动：docker-compose up -d nacos mysql redis

services:

  # ==================== Nacos ====================
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: lab-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=nacos_config
      - MYSQL_SERVICE_USER=root
      - MYSQL_SERVICE_PASSWORD=root123
    depends_on:
      - mysql
    networks:
      - lab-net

  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    container_name: lab-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: nacos_config
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - lab-net

  # ==================== MongoDB ====================
  mongodb:
    image: mongo:7.0
    container_name: lab-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - lab-net

  # ==================== Redis ====================
  redis:
    image: redis:7.2
    container_name: lab-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - lab-net

  # ==================== RocketMQ ====================
  rocketmq-namesrv:
    image: apache/rocketmq:5.1.4
    container_name: lab-rocketmq-namesrv
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    networks:
      - lab-net

  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: lab-rocketmq-broker
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      - NAMESRV_ADDR=rocketmq-namesrv:9876
    command: sh mqbroker -n rocketmq-namesrv:9876 autoCreateTopicEnable=true
    depends_on:
      - rocketmq-namesrv
    networks:
      - lab-net

  # ==================== Seata Server ====================
  seata-server:
    image: seataio/seata-server:2.0.0
    container_name: lab-seata
    ports:
      - "7091:7091"
      - "8091:8091"
    environment:
      - SEATA_IP=127.0.0.1
      - SEATA_PORT=8091
      - STORE_MODE=db
      - SEATA_CONFIG_NAME=file:/root/seata-config/registry
    networks:
      - lab-net

  # ==================== Sentinel Dashboard ====================
  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: lab-sentinel
    ports:
      - "8858:8858"
    networks:
      - lab-net

  # ==================== XXL-Job Admin ====================
  xxljob-admin:
    image: xuxueli/xxl-job-admin:2.4.1
    container_name: lab-xxljob
    ports:
      - "8859:8080"
    environment:
      PARAMS: |
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true
        --spring.datasource.username=root
        --spring.datasource.password=root123
    depends_on:
      - mysql
    networks:
      - lab-net

  # ==================== Prometheus ====================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: lab-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - lab-net

  # ==================== Grafana ====================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: lab-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - lab-net

  # ==================== Elasticsearch ====================
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: lab-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - lab-net

  # ==================== Kibana ====================
  kibana:
    image: kibana:8.13.0
    container_name: lab-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - lab-net

  # ==================== Logstash ====================
  logstash:
    image: logstash:8.13.0
    container_name: lab-logstash
    ports:
      - "5044:5044"
      - "5000:5000"
    volumes:
      - ./docker/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      - elasticsearch
    networks:
      - lab-net

  # ==================== SkyWalking OAP ====================
  skywalking-oap:
    image: apache/skywalking-oap-server:9.7.0
    container_name: lab-skywalking-oap
    ports:
      - "11800:11800"
      - "12800:12800"
    environment:
      - SW_STORAGE=elasticsearch
      - SW_STORAGE_ES_CLUSTER_NODES=elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - lab-net

  # ==================== SkyWalking UI ====================
  skywalking-ui:
    image: apache/skywalking-ui:9.7.0
    container_name: lab-skywalking-ui
    ports:
      - "8080:8080"
    environment:
      - SW_OAP_ADDRESS=http://skywalking-oap:12800
    depends_on:
      - skywalking-oap
    networks:
      - lab-net

volumes:
  mysql-data:
  mongo-data:
  redis-data:
  grafana-data:
  es-data:

networks:
  lab-net:
    driver: bridge
