version: '3.8'

# Spring Cloud Lab 基础设施一键启动
# 用法：docker-compose up -d
# 按需启动：docker-compose up -d nacos mysql redis

services:

  # ==================== Nacos ====================
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: lab-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=nacos_config
      - MYSQL_SERVICE_USER=root
      - MYSQL_SERVICE_PASSWORD=root123
    depends_on:
      - mysql
    networks:
      - lab-net

  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    container_name: lab-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: nacos_config
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - lab-net

  # ==================== MongoDB ====================
  mongodb:
    image: mongo:7.0
    container_name: lab-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - lab-net

  # ==================== Redis ====================
  redis:
    image: redis:7.2
    container_name: lab-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - lab-net

  # ==================== RocketMQ ====================
  rocketmq-namesrv:
    image: apache/rocketmq:5.1.4
    container_name: lab-rocketmq-namesrv
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    networks:
      - lab-net

  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: lab-rocketmq-broker
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      - NAMESRV_ADDR=rocketmq-namesrv:9876
    command: sh mqbroker -n rocketmq-namesrv:9876 autoCreateTopicEnable=true
    depends_on:
      - rocketmq-namesrv
    networks:
      - lab-net

  # ==================== Sentinel Dashboard ====================
  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: lab-sentinel
    ports:
      - "8858:8858"
    networks:
      - lab-net

  # ==================== XXL-Job Admin ====================
  xxljob-admin:
    image: xuxueli/xxl-job-admin:2.4.1
    container_name: lab-xxljob
    ports:
      - "8859:8080"
    environment:
      PARAMS: |
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true
        --spring.datasource.username=root
        --spring.datasource.password=root123
    depends_on:
      - mysql
    networks:
      - lab-net

volumes:
  mysql-data:
  mongo-data:
  redis-data:

networks:
  lab-net:
    driver: bridge
