server:
  port: 8700
spring:
  application:
    name: lab-observability
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848

# Actuator 端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,env
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  # Micrometer 公共标签（所有指标携带这些标签）
  metrics:
    tags:
      application: ${spring.application.name}
      env: dev

# 日志配置
logging:
  config: classpath:logback-spring.xml
