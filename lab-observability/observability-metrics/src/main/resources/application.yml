server:
  port: 8702
spring:
  application:
    name: observability-metrics
  cloud:
    nacos:
      server-addr: 192.168.179.128:8848
      username: nacos
      password: nacos
      discovery:
        namespace: 85baacbf-ae17-4c72-9a35-348679962b0e
        group: DEFAULT_GROUP

# Actuator 端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,env
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  # Micrometer 公共标签（所有指标携带这些标签，便于 Grafana 按服务/环境筛选）
  metrics:
    tags:
      application: ${spring.application.name}
      env: dev
