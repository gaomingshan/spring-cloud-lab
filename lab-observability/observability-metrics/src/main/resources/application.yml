server:
  port: 8702
spring:
  application:
    name: observability-metrics
  cloud:
    nacos:
      server-addr: ${LAB_NACOS_ADDR:127.0.0.1:8848}
      username: ${LAB_NACOS_USERNAME:nacos}
      password: ${LAB_NACOS_PASSWORD:nacos}
      discovery:
        namespace: ${LAB_NACOS_NAMESPACE:}
        group: ${LAB_NACOS_GROUP:DEFAULT_GROUP}

# Actuator 端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  # Micrometer 公共标签（所有指标携带这些标签，便于 Grafana 按服务/环境筛选）
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${LAB_ENV:local}

logging:
  file:
    name: ${LAB_LOG_DIR:./logs}/${spring.application.name}.log
