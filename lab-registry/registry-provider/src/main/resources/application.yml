server:
  port: 8091  # 启动第二个实例时改为 8091

spring:
  application:
    name: registry-provider  # 服务名，Nacos 中的注册名
  cloud:
    nacos:
      server-addr: ${LAB_NACOS_ADDR:127.0.0.1:8848}
      username: ${LAB_NACOS_USERNAME:nacos}
      password: ${LAB_NACOS_PASSWORD:nacos}
      discovery:
        # 命名空间（dev/prod 隔离）
        namespace: ${LAB_NACOS_NAMESPACE:}
        # 分组
        group: ${LAB_NACOS_GROUP:DEFAULT_GROUP}
        # 实例权重（0~1，调大/调小可影响负载均衡分发比例）
        weight: 1.0
        # 自定义元数据（可用于灰度路由标识）
        metadata:
          version: v1
          zone: beijing

management:
  endpoints:
    web:
      exposure:
        include: health,info,nacos-discovery
  endpoint:
    health:
      show-details: always
