server:
  port: 8300

spring:
  application:
    name: seata-order
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        group: DEFAULT_GROUP
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/seata_order?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root123

# Seata 配置
seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: my_tx_group          # 事务组名（需与 Seata Server 配置一致）
  service:
    vgroup-mapping:
      my_tx_group: default               # 事务组 -> Seata Server 集群映射
  registry:
    type: nacos                          # Seata Server 注册到 Nacos
    nacos:
      server-addr: 127.0.0.1:8848
      group: SEATA_GROUP
      application: seata-server
  config:
    type: nacos                          # Seata 配置中心
    nacos:
      server-addr: 127.0.0.1:8848
      group: SEATA_GROUP
