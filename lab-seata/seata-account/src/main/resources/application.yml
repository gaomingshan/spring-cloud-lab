server:
  port: ${SEATA_ACCOUNT_PORT:8301}
spring:
  application:
    name: seata-account
  cloud:
    nacos:
      server-addr: ${LAB_NACOS_ADDR:127.0.0.1:8848}
      username: ${LAB_NACOS_USERNAME:nacos}
      password: ${LAB_NACOS_PASSWORD:nacos}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${LAB_MYSQL_HOST:127.0.0.1}:${LAB_MYSQL_PORT:3306}/seata_account?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${LAB_MYSQL_USERNAME:root}
    password: ${LAB_MYSQL_PASSWORD:root123}
seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: my_tx_group
  service:
    vgroup-mapping:
      my_tx_group: default
  registry:
    type: nacos
    nacos:
      server-addr: ${LAB_NACOS_ADDR:127.0.0.1:8848}
      group: ${LAB_SEATA_GROUP:DEFAULT_GROUP}
      application: ${LAB_SEATA_APPLICATION:seata-server}
      username: ${LAB_NACOS_USERNAME:nacos}
      password: ${LAB_NACOS_PASSWORD:nacos}
  config:
    type: file
